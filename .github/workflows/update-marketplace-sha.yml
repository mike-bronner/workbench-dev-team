name: Update marketplace SHA

# On a published release, this workflow does two things, in order:
#
#   1. Bump + retarget (release events only). Sets this plugin's
#      .claude-plugin/plugin.json .version to the release tag, commits that on
#      main as github-actions[bot], and retargets the release tag onto the bump
#      commit. This keeps the released/pinned commit from carrying a stale
#      version. Idempotent: if plugin.json already matches the tag, both the
#      bump and the tag move are skipped.
#
#   2. Pin SHA. Resolves the (possibly retargeted) tag to a commit SHA and pins
#      it in the claude-workbench marketplace's .claude-plugin/marketplace.json,
#      so every release becomes reproducibly installable by SHA rather than
#      floating on the default branch.
#
# Both steps live in this single workflow on purpose: a separate workflow on
# `release: published` would race the pin and could pin the pre-bump commit.
#
# Runs automatically on every published release. Also supports manual backfill
# via workflow_dispatch (pass a tag to pin that release's SHA; omit to use the
# latest release). The backfill path re-pins historical releases only — it never
# bumps plugin.json or moves tags.
#
# Prerequisites:
# - Secret `DEVELOPER_SETTINGS_TOKEN` set at the repo or org level.
#   Classic PAT with `repo` scope (sufficient to push to the marketplace repo).
#
# Portability: this workflow reads the plugin's own name from
# .claude-plugin/plugin.json, so it drops into any workbench plugin repo
# unchanged.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to pin (defaults to latest release)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: update-marketplace-sha
  cancel-in-progress: false

jobs:
  pin-sha:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          # Writable main checkout: the bump step commits + pushes here, and the
          # resolve step reads the plugin name off main. fetch-depth: 0 so the
          # push has full history.
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump plugin.json + retarget tag
        # Release events only. The workflow_dispatch backfill path re-pins
        # historical releases and must never bump plugin.json or move a tag.
        if: ${{ github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${{ github.event.release.tag_name }}"

          # Tags carry no `v` prefix (e.g. 0.31.0). Validate semver-ish; if it
          # doesn't match, skip the bump and fall through to the existing pin.
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+([-.+].*)?$'; then
            echo "::warning::Release tag '$VERSION' is not semver-ish — skipping bump + tag move."
            exit 0
          fi

          FILE=".claude-plugin/plugin.json"
          CURRENT=$(jq -r '.version' "$FILE")

          if [ "$CURRENT" = "$VERSION" ]; then
            echo "plugin.json already at $VERSION — skipping bump and tag move."
            exit 0
          fi

          # Set .version, preserving the file's 2-space indentation, in place.
          jq --indent 2 --arg v "$VERSION" '.version = $v' "$FILE" > "$FILE.tmp"
          mv "$FILE.tmp" "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "chore: 🔖 Bump version to $VERSION."
          git push origin main

          BUMP_SHA=$(git rev-parse HEAD)
          echo "Bumped plugin.json $CURRENT → $VERSION at $BUMP_SHA"

          # Reassign the release tag to the bump commit so the pin step (and the
          # release itself) point at the bumped version. Proven mechanism — this
          # is exactly how 0.31.0 was fixed by hand.
          gh api --method PATCH \
            "repos/${{ github.repository }}/git/refs/tags/$VERSION" \
            -f sha="$BUMP_SHA" -F force=true
          echo "Retargeted tag $VERSION → $BUMP_SHA"

      - name: Resolve plugin name + tag SHA
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PLUGIN_NAME=$(jq -r '.name' .claude-plugin/plugin.json)
          echo "plugin_name=$PLUGIN_NAME" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(gh release view --repo "${{ github.repository }}" --json tagName --jq '.tagName')
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Resolve tag ref → commit SHA, dereferencing annotated tags.
          REF=$(gh api "repos/${{ github.repository }}/git/refs/tags/$TAG")
          OBJECT_TYPE=$(echo "$REF" | jq -r '.object.type')
          OBJECT_SHA=$(echo "$REF" | jq -r '.object.sha')

          if [ "$OBJECT_TYPE" = "tag" ]; then
            SHA=$(gh api "repos/${{ github.repository }}/git/tags/$OBJECT_SHA" --jq '.object.sha')
          else
            SHA="$OBJECT_SHA"
          fi

          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved $PLUGIN_NAME @ $TAG → $SHA"

      - name: Update marketplace.json
        env:
          GH_TOKEN: ${{ secrets.DEVELOPER_SETTINGS_TOKEN }}
          PLUGIN_NAME: ${{ steps.resolve.outputs.plugin_name }}
          TAG: ${{ steps.resolve.outputs.tag }}
          SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::DEVELOPER_SETTINGS_TOKEN secret is not set."
            echo "Create a fine-grained PAT with Contents:Read+Write on mike-bronner/claude-workbench"
            echo "and add it as DEVELOPER_SETTINGS_TOKEN in this repo's secrets."
            exit 1
          fi

          git clone --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/mike-bronner/claude-workbench.git" \
            marketplace
          cd marketplace

          FILE=".claude-plugin/marketplace.json"

          # Set source.sha for the matching plugin; leave others untouched.
          jq --arg name "$PLUGIN_NAME" --arg sha "$SHA" \
             '.plugins |= map(if .name == $name then .source.sha = $sha else . end)' \
             "$FILE" > "$FILE.tmp"
          mv "$FILE.tmp" "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"

          if git diff --cached --quiet; then
            echo "No changes — $PLUGIN_NAME is already pinned to $SHA"
            exit 0
          fi

          git commit -m "chore: pin $PLUGIN_NAME to $TAG ($SHA)"
          git push
